# Render blueprint — NoLoop backend (issue #16).
# FREE-tier setup: the two FastAPI services run on Render's free web plan, and
# the async worker is OMITTED (background workers have NO free tier on Render).
# Without the worker, the API adjudicates synchronously (NOLOOP_USE_QUEUE=0) —
# this is the default and fully supported path.
#
# The two Next.js frontends deploy on Vercel (see DEPLOY.md), not here.
# Secrets (sync:false) are set once in the Render dashboard, never committed.
# Apply: Render → New → Blueprint → point at this repo.
#
# To upgrade later: change plan: free → starter, and re-enable the worker block
# at the bottom (set NOLOOP_USE_QUEUE=1 on all services).

services:
  # ── Core API (FastAPI) ──────────────────────────────────
  - type: web
    name: noloop-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL          # Supabase pooler (pgbouncer, transaction mode)
        sync: false
      - key: DIRECT_URL            # Supabase direct (Alembic migrations)
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REDIS_URL             # Upstash — rate limiter (queue off on free tier)
        sync: false
      - key: CORS_ORIGINS          # comma-separated Vercel domains
        sync: false
      - key: NOLOOP_USE_QUEUE      # 0 = synchronous adjudication (no worker needed)
        value: "0"
      - key: AI_ENGINE_URL         # set to noloop-ai's https URL after it deploys
        sync: false

  # ── AI engine (FastAPI) ─────────────────────────────────
  - type: web
    name: noloop-ai
    runtime: python
    rootDir: ai
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GROQ_API_KEY          # optional — engine + RAG run without it
        sync: false
      - key: NOLOOP_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: NOLOOP_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: NOLOOP_RAG_COVERAGE
        value: "1"
      # For production semantic retrieval, also install requirements-rag.txt and set:
      #   NOLOOP_EMBEDDING_BACKEND=sentence-transformers, NOLOOP_RAG_STORE=pgvector,
      #   DATABASE_URL=<supabase>  (see ai/RAG.md)

  # ── Async worker (arq) — DISABLED on free tier ──────────
  # Background workers require a paid Render plan. Re-enable this block (and set
  # NOLOOP_USE_QUEUE=1 everywhere) when you move off the free tier.
  #
  # - type: worker
  #   name: noloop-worker
  #   runtime: python
  #   rootDir: backend
  #   plan: starter
  #   buildCommand: pip install -r requirements.txt
  #   startCommand: arq app.worker.WorkerSettings
  #   autoDeploy: true
  #   envVars:
  #     - key: PYTHON_VERSION
  #       value: "3.12"
