# Tooling config for the NoLoop AI engine (FastAPI).
# Runtime deps live in requirements.txt; this file configures ruff/pytest.

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "W"]
# UP042: (str, Enum) → StrEnum changes str() semantics the schemas rely on.
ignore = ["E501", "B008", "UP042"]

[tool.ruff.lint.per-file-ignores]
# main.py must call load_dotenv() before importing modules that read env at
# import time, so imports are intentionally not all at the top.
"app/main.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
exclude = ["\\.venv", "tests"]
