[alembic]
script_location = migrations
# Put backend/ (the dir holding this file) on sys.path so env.py can
# `from app.config import ...` without needing PYTHONPATH set — makes plain
# `alembic upgrade head` work locally and on Render.
prepend_sys_path = .
# URL is injected by migrations/env.py from app.config (pooler host).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
