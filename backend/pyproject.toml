# Tooling config for the NoLoop core backend (FastAPI).
# Runtime deps live in requirements.txt; this file configures ruff/pytest/mypy.

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [".venv", "migrations/versions", "data"]

[tool.ruff.lint]
# Sensible defaults + import sorting + common bug/upgrade lints.
select = ["E", "F", "I", "UP", "B", "C4", "W"]
# E501 (line length) is handled by the formatter; B008 fights FastAPI's
# Depends()-in-defaults idiom; UP042 would push (str, Enum) → StrEnum, which
# changes str() semantics the JS-parity layer relies on; UP031 flags the
# deliberate %-format used for en-IN money grouping.
ignore = ["E501", "B008", "UP042", "UP031"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
exclude = ["\\.venv", "migrations", "tests"]
